services:
  relay:
    build:
      context: .
      dockerfile: server/Dockerfile
    image: atomic-relay:local
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
