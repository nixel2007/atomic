name: Build Desktop

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }} desktop app
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      matrix:
        include:
          - os: macos-latest
            name: macOS
            task: ':composeApp:packageDmg'
            artifact-path: 'composeApp/build/compose/binaries/main/dmg/*.dmg'
            artifact-name: atomic-desktop-dmg
          - os: windows-latest
            name: Windows
            task: ':composeApp:packageMsi'
            artifact-path: 'composeApp/build/compose/binaries/main/msi/*.msi'
            artifact-name: atomic-desktop-msi
          - os: ubuntu-latest
            name: Linux
            task: ':composeApp:packageDeb'
            artifact-path: 'composeApp/build/compose/binaries/main/deb/*.deb'
            artifact-name: atomic-desktop-deb

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platform-tools platforms;android-36'

      - name: Build ${{ matrix.name }} distributable
        run: ./gradlew ${{ matrix.task }} --no-daemon --stacktrace

      - name: Upload distributable
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          retention-days: 1
          if-no-files-found: error

      - name: Build Windows ZIP distributable
        if: matrix.name == 'Windows'
        run: ./gradlew :composeApp:createReleaseDistributable --no-daemon --stacktrace

      - name: Pack Windows ZIP
        if: matrix.name == 'Windows'
        run: Compress-Archive -Path composeApp/build/compose/binaries/main-release/app/* -DestinationPath atomic-windows.zip
        shell: pwsh

      - name: Upload Windows ZIP distributable
        if: matrix.name == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: atomic-desktop-zip
          path: atomic-windows.zip
          retention-days: 1
          if-no-files-found: error

      - name: Build Linux/macOS ZIP distributable
        if: matrix.name == 'Linux' || matrix.name == 'macOS'
        run: ./gradlew :composeApp:createReleaseDistributable --no-daemon --stacktrace

      - name: Pack Linux ZIP
        if: matrix.name == 'Linux'
        run: zip -r atomic-linux.zip composeApp/build/compose/binaries/main-release/app/

      - name: Upload Linux ZIP distributable
        if: matrix.name == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: atomic-desktop-linux-zip
          path: atomic-linux.zip
          retention-days: 1
          if-no-files-found: error

      - name: Pack macOS ZIP
        if: matrix.name == 'macOS'
        run: zip -r atomic-macos.zip composeApp/build/compose/binaries/main-release/app/

      - name: Upload macOS ZIP distributable
        if: matrix.name == 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: atomic-desktop-macos-zip
          path: atomic-macos.zip
          retention-days: 1
          if-no-files-found: error
